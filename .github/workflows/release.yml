name: Release

on:
  push:
    branches:
      - main
    paths:
      - 'elallas-for-woo.php'
  workflow_dispatch:

jobs:
  validate:
    name: Validate (PHP 8.0)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Setup PHP 8.0
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.0'
          tools: composer

      - name: Install dependencies
        run: composer install --no-progress --prefer-dist

      - name: PHP 8.0 compatibility + coding standards
        run: composer phpcs

      - name: Tests
        run: composer test

  release:
    name: Release
    needs: validate
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Extract version from plugin file
        id: get_version
        run: |
          VERSION=$(grep -m1 "Version:" elallas-for-woo.php | sed 's/.*Version:[[:space:]]*//' | tr -d '[:space:]')
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Extracted version: $VERSION"

      - name: Check if tag exists
        id: check_tag
        env:
          VERSION: ${{ steps.get_version.outputs.version }}
        run: |
          if git rev-parse "v$VERSION" >/dev/null 2>&1; then
            echo "exists=true" >> $GITHUB_OUTPUT
            echo "Tag v$VERSION already exists"
          else
            echo "exists=false" >> $GITHUB_OUTPUT
            echo "Tag v$VERSION does not exist"
          fi

      - name: Setup PHP
        if: steps.check_tag.outputs.exists == 'false'
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'

      - name: Install production dependencies
        if: steps.check_tag.outputs.exists == 'false'
        run: composer install --no-dev --optimize-autoloader --no-interaction

      - name: Scope bundled dependencies (Strauss)
        if: steps.check_tag.outputs.exists == 'false'
        run: |
          curl -sSL -o strauss.phar https://github.com/BrianHenryIE/strauss/releases/download/0.27.3/strauss.phar
          php strauss.phar
          composer dump-autoload --no-dev --optimize --no-interaction
          test -f vendor-prefixed/dompdf/dompdf/src/Dompdf.php || { echo "Strauss scoping failed: vendor-prefixed/dompdf missing"; exit 1; }
          ! grep -rq "^namespace Dompdf;" vendor/ || { echo "Global Dompdf still present in vendor/ after scoping"; exit 1; }

      - name: Create release ZIP
        if: steps.check_tag.outputs.exists == 'false'
        env:
          VERSION: ${{ steps.get_version.outputs.version }}
        run: |
          mkdir -p dist/elallas-for-woo
          rsync -av --exclude='.git' --exclude='.github' --exclude='dist' \
            --exclude='builds' --exclude='composer.json' --exclude='composer.lock' \
            --exclude='phpcs.xml.dist' --exclude='phpstan.neon.dist' --exclude='phpunit.xml.dist' \
            --exclude='docs' --exclude='tests' --exclude='node_modules' --exclude='.gitignore' \
            --exclude='strauss.phar' --exclude='*.log' . dist/elallas-for-woo/
          cd dist && zip -r "elallas-for-woo-${VERSION}.zip" elallas-for-woo/

      - name: Create tag and release
        if: steps.check_tag.outputs.exists == 'false'
        uses: softprops/action-gh-release@v3
        with:
          tag_name: v${{ steps.get_version.outputs.version }}
          name: v${{ steps.get_version.outputs.version }}
          body: |
            ## Elallas for WooCommerce v${{ steps.get_version.outputs.version }}

            ### Installation

            **Via Composer:**
            ```bash
            composer require uptools-io/elallas-for-woo
            ```

            **Manual Installation:**
            1. Download `elallas-for-woo-${{ steps.get_version.outputs.version }}.zip`
            2. Upload to `/wp-content/plugins/`
            3. Activate in WordPress admin

            ### Changelog

            See [readme.txt](https://github.com/uptools-io/elallas-for-woo/blob/main/readme.txt) for the full changelog.
          files: |
            dist/elallas-for-woo-${{ steps.get_version.outputs.version }}.zip
          draft: false
          prerelease: false
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
